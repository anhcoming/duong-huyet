<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Theo dõi đường huyết Vợ iu ♥</title>
<style>
  :root{
    --bg:#f4f6f8; --panel:#ffffff; --panel2:#f0f3f6; --line:#dfe5ea;
    --txt:#1a2730; --muted:#6b7d89; --accent:#0a8a68;
    --ok:#0a7256; --okbg:#cdf0e2; --warn:#a86807; --warnbg:#fbe9c2;
    --high:#c12f2f; --highbg:#f8d2d2;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);color:var(--txt);line-height:1.5;
    min-height:100vh;padding:20px 16px 60px;
    transition:background .5s ease;
  }
  body.state-ok{background:#bfeeda;--accent:#0a7256}
  body.state-warn{background:#fbe0a8;--accent:#a86807}
  body.state-high{background:#f9c6c6;--accent:#c12f2f}
  .wrap{max-width:760px;margin:0 auto}
  header{margin-bottom:24px;text-align:center}
  h1{font-size:24px;font-weight:700;letter-spacing:-.2px;display:flex;align-items:center;justify-content:center;gap:9px}
  h1 .heart{color:#e26d8a;font-size:22px;animation:beat 1.4s ease-in-out infinite;display:inline-block}
  h1 .ele{font-size:24px;display:inline-block;animation:sway 3s ease-in-out infinite;transform-origin:bottom center}
  @keyframes beat{0%,100%{transform:scale(1)}15%{transform:scale(1.25)}30%{transform:scale(1)}45%{transform:scale(1.18)}}
  @keyframes sway{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}}
  @media(prefers-reduced-motion:reduce){ h1 .heart,h1 .ele{animation:none} }

  /* Popup lời nhắn giữa màn hình - không khung */
  #pop{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:60;
    background:rgba(20,35,48,.18);backdrop-filter:blur(3px)}
  #pop.show{display:flex;animation:fadein .3s ease}
  #pop .emo{font-size:96px;line-height:1;margin-bottom:6px;
    filter:drop-shadow(0 8px 20px rgba(0,0,0,.25));animation:emoIn .6s cubic-bezier(.2,1.5,.4,1)}
  #pop .msg{font-size:30px;font-weight:800;line-height:1.35;text-align:center;max-width:88%;
    color:#fff;animation:msgIn .5s ease .12s both;letter-spacing:-.3px;
    -webkit-text-stroke:1px rgba(0,0,0,.35);
    text-shadow:0 0 2px #fff,0 0 6px rgba(255,255,255,.9),0 3px 14px rgba(0,0,0,.45),
                -1px -1px 0 #fff,1px -1px 0 #fff,-1px 1px 0 #fff,1px 1px 0 #fff}
  #pop.p-ok .msg{color:#0a7256}
  #pop.p-warn .msg{color:#a86807}
  #pop.p-high .msg{color:#b52828}
  @keyframes fadein{from{opacity:0}to{opacity:1}}
  @keyframes emoIn{0%{transform:scale(0) rotate(-25deg);opacity:0}60%{transform:scale(1.25) rotate(8deg)}100%{transform:scale(1) rotate(0);opacity:1}}
  @keyframes msgIn{0%{transform:translateY(16px);opacity:0}100%{transform:translateY(0);opacity:1}}
  @media(prefers-reduced-motion:reduce){ #pop .emo,#pop .msg{animation:none} }

  /* Modal xem bảng - full màn hình, zoom/pan */
  #tableModal{position:fixed;inset:0;display:none;z-index:55;background:rgba(15,25,35,.92);
    flex-direction:column;touch-action:none;user-select:none}
  #tableModal.show{display:flex;animation:fadein .2s ease}
  #tableModal .tm-bar{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;
    justify-content:space-between;padding:12px 16px;z-index:2;
    background:linear-gradient(rgba(0,0,0,.35),transparent);color:#fff}
  #tableModal .tm-bar .ttl{font-size:14px;font-weight:600;opacity:.95}
  #tableModal .tm-tools{display:flex;gap:8px;align-items:center}
  #tableModal .tm-btn{background:rgba(255,255,255,.16);border:none;color:#fff;cursor:pointer;
    width:38px;height:38px;border-radius:50%;font-size:18px;display:flex;align-items:center;justify-content:center;
    transition:background .15s}
  #tableModal .tm-btn:hover{background:rgba(255,255,255,.3)}
  #tableModal .tm-stage{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative}
  #tableModal img{max-width:100%;max-height:100%;transform-origin:center center;
    transition:transform .12s ease-out;cursor:grab}
  #tableModal img.grabbing{cursor:grabbing;transition:none}
  .sub{color:var(--muted);font-size:13px;margin-top:5px}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:22px;margin-bottom:20px;box-shadow:0 2px 10px rgba(20,40,55,.05)}
  .card h2{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:16px}
  .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px}
  .card-head h2{margin-bottom:0}
  .view-btn{flex:none;background:transparent;border:1px solid var(--line);color:var(--muted);
    padding:8px 16px;font-size:13px;font-weight:600;border-radius:12px;cursor:pointer;
    font-family:inherit;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;transition:background .15s}
  .view-btn:hover{background:var(--panel2);color:var(--txt)}
  .view-btn:active{transform:scale(.97)}

  label{display:block;font-size:13px;color:var(--muted);margin-bottom:7px}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .row > div{flex:1;min-width:140px}

  input[type=number],input[type=date],input[type=time],select,textarea{
    width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:14px;
    color:var(--txt);padding:12px 14px;font-size:15px;font-family:inherit;outline:none;
  }
  input:focus,select:focus,textarea:focus{border-color:var(--accent)}
  textarea{resize:vertical;min-height:46px}

  /* Ô nhập chính: to, nổi bật */
  .big-input{font-size:34px !important;font-weight:700;padding:18px 18px !important;text-align:center;letter-spacing:-.5px;border-radius:18px !important}
  .big-input::placeholder{font-size:22px;font-weight:400;letter-spacing:0}
  .big-note{font-size:18px !important;min-height:64px;padding:14px 16px !important;border-radius:16px !important}
  .big-note::placeholder{font-size:15px}
  .field-lg label{font-size:14px;margin-bottom:9px}

  .seg{display:flex;gap:8px;flex-wrap:wrap}
  .seg button{
    flex:1;min-width:100px;background:var(--panel2);border:1px solid var(--line);
    color:var(--muted);padding:11px 8px;border-radius:14px;font-size:13px;cursor:pointer;
    font-family:inherit;transition:background .4s ease,color .2s,border-color .4s;
  }
  .seg button.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}

  .verdict{border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-top:4px}
  .verdict .ic{font-size:22px;line-height:1}
  .verdict .txtwrap{flex:1;font-size:16px;font-weight:600}
  .verdict .txtwrap small{display:block;font-weight:400;color:var(--muted);font-size:12px;margin-top:2px}
  .verdict .mmolval{font-size:28px;font-weight:700;letter-spacing:-.5px;line-height:1}
  .verdict .mmolval span{font-size:13px;font-weight:400;color:var(--muted);margin-left:3px}
  .v-ok{background:var(--okbg);color:var(--ok)}
  .v-warn{background:var(--warnbg);color:var(--warn)}
  .v-high{background:var(--highbg);color:var(--high)}

  .btn{background:var(--accent);color:#fff;border:none;border-radius:16px;padding:15px;
    font-size:15px;font-weight:600;cursor:pointer;width:100%;font-family:inherit;transition:background .5s ease,filter .15s,transform .1s}
  .btn:hover{filter:brightness(1.06)}
  .btn:active{transform:scale(.98)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--muted)}

  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:12px}
  .stat{background:var(--panel2);border-radius:16px;padding:14px;text-align:center}
  .stat .n{font-size:24px;font-weight:700}
  .stat .l{font-size:12px;color:var(--muted);margin-top:2px}

  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;color:var(--muted);font-weight:500;padding:8px 6px;border-bottom:1px solid var(--line);font-size:12px}
  td{padding:10px 6px;border-bottom:1px solid var(--line);vertical-align:top}
  tr:last-child td{border-bottom:none}
  .pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
  .p-ok{background:var(--okbg);color:var(--ok)}
  .p-warn{background:var(--warnbg);color:var(--warn)}
  .p-high{background:var(--highbg);color:var(--high)}
  .mval{font-weight:700;font-size:15px}
  .mval.hi{color:var(--high)}
  .del{color:var(--muted);cursor:pointer;background:none;border:none;font-size:15px;padding:2px 6px}
  .del:hover{color:var(--high)}
  .edit{color:var(--muted);cursor:pointer;background:none;border:none;font-size:14px;padding:2px 6px}
  .edit:hover{color:var(--accent)}
  .editbar{display:none;align-items:center;gap:10px;background:var(--panel2);border:1px solid var(--accent);
    border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--txt)}
  .editbar.on{display:flex}
  .editbar .x{margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;text-decoration:underline}
  .empty{color:var(--muted);text-align:center;padding:30px 0;font-size:14px}
  .toolbar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .toolbar .btn{width:auto;padding:9px 16px;font-size:13px}
  .note-cell{color:var(--muted);max-width:160px}
  @media(max-width:560px){
    .hide-sm{display:none}
    .verdict .mmolval{font-size:24px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1><span class="ele" aria-hidden="true">🐘</span>Theo dõi đường huyết Vợ iu<span class="heart">♥</span></h1>
    <div class="sub">Nhập mg/dL — tự quy ra mmol/L và đánh giá theo thời điểm đo</div>
  </header>


  <!-- NHẬP -->
  <div class="card">
    <h2 id="formTitle">Nhập kết quả đo</h2>

    <div class="editbar" id="editbar">
      <span>Đang sửa bản ghi cũ</span>
      <button class="x" id="cancelEdit">Huỷ</button>
    </div>

    <label>Thời điểm đo</label>
    <div class="seg" id="seg" style="margin-bottom:6px">
      <button data-k="doi" class="active">Lúc đói</button>
      <button data-k="h1">Sau ăn 1h</button>
      <button data-k="h2">Sau ăn 2h</button>
    </div>
    <div id="hint" style="font-size:12px;color:var(--muted);margin-bottom:16px"></div>

    <div class="field-lg" style="margin-bottom:16px">
      <label>Đường huyết (mg/dL)</label>
      <input type="number" id="mg" class="big-input" placeholder="110" inputmode="numeric"
             min="20" max="600" step="1" autocomplete="off">
    </div>

    <!-- KẾT QUẢ TỨC THỜI -->
    <div id="live" style="display:none;margin-bottom:16px">
      <div class="verdict" id="liveVerdict"></div>
    </div>

    <div class="field-lg" style="margin-bottom:16px">
      <label>Ghi chú món ăn / vận động</label>
      <textarea id="note" class="big-note" placeholder="VD: 1/3 bát cơm, rau luộc, thịt gà"></textarea>
    </div>

    <button class="btn" id="save" disabled>Lưu vào dữ liệu</button>
  </div>

  <!-- THỐNG KÊ -->
  <div class="card" id="statsCard" style="display:none">
    <h2>Tổng quan</h2>
    <div class="stats">
      <div class="stat"><div class="n" id="stTotal">0</div><div class="l">Lần đo</div></div>
      <div class="stat"><div class="n" id="stOk" style="color:var(--ok)">0</div><div class="l">Đạt mục tiêu</div></div>
      <div class="stat"><div class="n" id="stHigh" style="color:var(--high)">0</div><div class="l">Vượt mục tiêu</div></div>
      <div class="stat"><div class="n" id="stAvg">0</div><div class="l">TB mmol/L</div></div>
    </div>
  </div>

  <!-- LỊCH SỬ -->
  <div class="card">
    <div class="card-head">
      <h2>Lịch sử đo</h2>
      <button class="view-btn" id="viewBtn"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-top:-1px"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg> Xem ảnh</button>
    </div>
    <div id="history"></div>
  </div>
</div>
<div id="pop" role="status" aria-live="polite">
  <div class="emo" id="popEmo">🎉</div>
  <div class="msg" id="popMsg"></div>
</div>

<div id="tableModal" aria-hidden="true">
  <div class="tm-bar">
    <span class="ttl">Bảng theo dõi</span>
    <div class="tm-tools">
      <button class="tm-btn" id="zoomOut" aria-label="Thu nhỏ">−</button>
      <button class="tm-btn" id="zoomIn" aria-label="Phóng to">+</button>
      <button class="tm-btn" id="tableDownload" aria-label="Tải ảnh">⤓</button>
      <button class="tm-btn" id="tableClose" aria-label="Đóng">✕</button>
    </div>
  </div>
  <div class="tm-stage" id="tmStage">
    <img id="tableImg" alt="Bảng theo dõi đường huyết" draggable="false">
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

// ====================================================================
//  CẤU HÌNH CƠ SỞ DỮ LIỆU  — điền 2 dòng dưới đây (xem hướng dẫn)
// ====================================================================
const SUPABASE_URL = "https://cxhvsevxaotvhlcslgrb.supabase.co";
const SUPABASE_KEY = "sb_publishable_IzJxgrsDzJNXWwVpIqVQCw_yRSJ3Dw5";
// ====================================================================

let sb = null;
const dbOn = SUPABASE_URL && SUPABASE_KEY;
if(dbOn){ try{ sb = createClient(SUPABASE_URL, SUPABASE_KEY); }catch(e){ console.error(e); } }

function showErr(msg){ /* không hiện thông báo db */ }

// ===== Mục tiêu (mmol/L) theo thời điểm =====
const TARGETS = {
  doi: { label:"Lúc đói",  max:5.3 },
  h1:  { label:"Sau ăn 1h", max:7.8 },
  h2:  { label:"Sau ăn 2h", max:6.7 },
};
const toMmol = mg => mg/18;
const fmt = n => (Math.round(n*10)/10).toFixed(1).replace('.', ',');

// Đánh giá: ổn định / hơi cao / cao
function assess(mmol, kind){
  const max = TARGETS[kind].max;
  if(mmol <= max) return {cls:"ok", ic:"✓", txt:"Ổn định", sub:`Trong mục tiêu (< ${fmt(max)} mmol/L)`};
  if(mmol <= max + 1.0) return {cls:"warn", ic:"!", txt:"Hơi cao", sub:`Vượt nhẹ mục tiêu < ${fmt(max)} mmol/L`};
  return {cls:"high", ic:"▲", txt:"Cao", sub:`Vượt mục tiêu < ${fmt(max)} mmol/L`};
}

// ===== State =====
let records = [];
let curKind = "doi";
let userPicked = false; // người dùng tự chọn thì không tự đoán đè lên
let editingId = null;   // id bản ghi đang sửa (null = thêm mới)
const $ = id => document.getElementById(id);

// Tự đoán thời điểm đo tiếp theo dựa trên lần đo gần nhất trong ngày
function suggestKind(){
  if(!records.length) return "doi";
  const today = todayStr();
  const last = records.find(r => r.date === today); // records[0] mới nhất
  if(!last) return "doi";                            // ngày mới, chưa đo
  if(last.kind === "doi") return "h1";               // đói -> sau ăn 1h
  if(last.kind === "h2")  return "doi";              // sau ăn 2h -> vòng mới, về đói
  if(last.kind === "h1"){
    const a = assess(last.mmol, "h1");
    return a.cls === "ok" ? "doi" : "h2";            // 1h ổn -> về đói; 1h cao -> theo dõi 2h
  }
  return "doi";
}
function applySuggestion(){
  if(userPicked){ $('hint').textContent=''; return; }
  curKind = suggestKind();
  [...$('seg').children].forEach(x=> x.classList.toggle('active', x.dataset.k===curKind));
  $('hint').innerHTML = `<span style="color:var(--accent)">●</span> Tự đề xuất: <b style="color:var(--txt)">${TARGETS[curKind].label}</b> — bấm để chọn khác`;
  updateLive();
}

// Báo trạng thái kết nối (đã tắt)
function setStatus(kind, text){ /* không hiện thông báo db */ }

// Storage qua Supabase; fallback bộ nhớ tạm nếu chưa cấu hình
async function load(){
  if(!sb){ return window.__mem || []; }
  try{
    const { data, error } = await sb.from('readings').select('*').order('created_at', { ascending:false });
    if(error){ return []; }
    return data || [];
  }catch(err){ return []; }
}
// Thêm 1 bản ghi mới
async function dbInsert(rec){
  if(!sb){ window.__mem = [rec, ...(window.__mem||[])]; return rec; }
  const { data, error } = await sb.from('readings').insert(rec).select().single();
  if(error){ showErr(error.message); return null; }
  return data;
}
// Cập nhật bản ghi
async function dbUpdate(id, patch){
  if(!sb){ (window.__mem||[]).forEach(r=>{ if(r.id===id) Object.assign(r,patch); }); return; }
  const { error } = await sb.from('readings').update(patch).eq('id', id);
  if(error) showErr(error.message);
}
// Xoá bản ghi
async function dbDelete(id){
  if(!sb){ window.__mem = (window.__mem||[]).filter(r=> r.id!==id); return; }
  const { error } = await sb.from('readings').delete().eq('id', id);
  if(error) showErr(error.message);
}


// ===== Ngày giờ tự động =====
function todayStr(){ return new Date().toISOString().slice(0,10); }
function nowTime(){ return new Date().toTimeString().slice(0,5); }

// segment buttons
$('seg').addEventListener('click', e=>{
  const b = e.target.closest('button'); if(!b) return;
  [...$('seg').children].forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  curKind = b.dataset.k;
  userPicked = true;   // người dùng tự chọn -> không tự đoán đè trong lần nhập này
  $('hint').textContent = '';
  updateLive();
});

// Chặn gõ chữ và ký tự không hợp lệ (e, E, +, -, dấu chấm/phẩy)
$('mg').addEventListener('keydown', e=>{
  if(['e','E','+','-','.',','].includes(e.key)) e.preventDefault();
});
// Lọc: chỉ giữ chữ số, tối đa 3 ký tự
$('mg').addEventListener('input', ()=>{
  let v = $('mg').value.replace(/[^\d]/g,'');
  if(v.length>3) v = v.slice(0,3);
  if($('mg').value !== v) $('mg').value = v;
  updateLive();
});
// Dán: lọc luôn
$('mg').addEventListener('paste', e=>{
  e.preventDefault();
  const t=(e.clipboardData||window.clipboardData).getData('text').replace(/[^\d]/g,'').slice(0,3);
  $('mg').value=t; updateLive();
});

const MG_MIN=20, MG_MAX=600;  // khoảng hợp lý của đường huyết (mg/dL)

function updateLive(){
  const mg = parseInt($('mg').value,10);
  if(!mg || mg<=0){
    $('live').style.display='none'; $('save').disabled=true; $('hint2') && ($('hint2').textContent='');
    document.body.classList.remove('state-ok','state-warn','state-high');
    return;
  }
  // Ngoài khoảng hợp lý -> báo và không cho lưu
  if(mg < MG_MIN || mg > MG_MAX){
    $('live').style.display='block';
    const v=$('liveVerdict');
    v.className='verdict v-warn';
    v.innerHTML = `<span class="ic">!</span>`
      + `<div class="txtwrap">Giá trị chưa hợp lý<small>Đường huyết thường trong khoảng ${MG_MIN}–${MG_MAX} mg/dL</small></div>`;
    $('save').disabled = true;
    document.body.classList.remove('state-ok','state-warn','state-high');
    return;
  }
  const mmol = toMmol(mg);
  const a = assess(mmol, curKind);
  $('live').style.display='block';
  const v = $('liveVerdict');
  v.className = 'verdict v-'+a.cls;
  v.innerHTML = `<span class="ic">${a.ic}</span>`
    + `<div class="txtwrap">${a.txt} — ${TARGETS[curKind].label}<small>${a.sub}</small></div>`
    + `<div class="mmolval">${fmt(mmol)}<span>mmol/L</span></div>`;
  $('save').disabled = false;
  document.body.classList.remove('state-ok','state-warn','state-high');
  document.body.classList.add('state-'+a.cls);
}

// ===== Popup lời nhắn + confetti =====
let popTimer = null;
function showPopup(cls){
  const data = {
    ok:   { emo:'🎉', list:['Làm tốt lắm vợ iuuu ♥', 'Tuyệt vời ông mặt trời!', 'Giỏi quá đi à ♥'] },
    warn: { emo:'👍', list:['Khá ổn rùi nha', 'Ổn áp, cố thêm tí nữa 💪', 'Gần đạt rồi vợ ơi'] },
    high: { emo:'🥰', list:['Hơi cao chút xíu, mình xem lại thực đơn nha vợ ♥', 'Không sao đâu, lần này hơi cao tí thôi 💪', 'Mình điều chỉnh bữa ăn lại chút là ổn ngay ♥'] },
  };
  const d = data[cls] || data.ok;
  const text = d.list[Math.floor(Math.random()*d.list.length)];
  const pop = $('pop');
  pop.className = 'p-'+cls;
  $('popEmo').textContent = d.emo;
  $('popMsg').textContent = text;
  void pop.offsetWidth;
  pop.classList.add('show', 'p-'+cls);
  if(cls==='ok') launchConfetti();           // tung hoa khi đạt mục tiêu
  clearTimeout(popTimer);
  popTimer = setTimeout(hidePopup, cls==='ok'?2600:2200);
  pop.onclick = hidePopup;                    // chạm để tắt sớm
}
function hidePopup(){
  $('pop').classList.remove('show');
  // ô nhập đang trống -> trả nền về mặc định
  if(!$('mg').value) document.body.classList.remove('state-ok','state-warn','state-high');
}

function launchConfetti(){
  if(typeof confetti !== 'function') return;   // thư viện chưa load thì bỏ qua
  const colors = ['#f3b8c8','#bcd3ea','#0a7256','#f0c674','#e26d8a','#9fd3c0','#c9a0e0'];
  // đợt nổ giữa
  confetti({ particleCount:120, spread:80, startVelocity:45, origin:{y:0.6}, colors });
  // hai bên bắn vào
  setTimeout(()=> confetti({ particleCount:70, angle:60, spread:70, origin:{x:0, y:0.65}, colors }), 120);
  setTimeout(()=> confetti({ particleCount:70, angle:120, spread:70, origin:{x:1, y:0.65}, colors }), 120);
  // mưa nhẹ phía trên
  setTimeout(()=> confetti({ particleCount:60, spread:120, startVelocity:30, gravity:0.8, scalar:0.9, origin:{y:0.3}, colors }), 320);
}

// ===== Save (thêm mới hoặc cập nhật) =====
$('save').addEventListener('click', async ()=>{
  const mg = parseInt($('mg').value,10);
  if(!mg || mg < MG_MIN || mg > MG_MAX) return;   // chỉ lưu giá trị hợp lý
  $('save').disabled = true;
  const verdictCls = assess(toMmol(mg), curKind).cls;  // mức để chọn lời nhắn

  if(editingId !== null){
    const patch = {
      mg: Math.round(mg),
      mmol: Math.round(toMmol(mg)*10)/10,
      kind: curKind,
      note: $('note').value.trim(),
      edited: true,
    };
    const r = records.find(x=> x.id === editingId);
    if(r) Object.assign(r, patch);
    await dbUpdate(editingId, patch);
    exitEdit();
  } else {
    const rec = {
      id: (crypto.randomUUID ? crypto.randomUUID() : String(Date.now())),
      mg: Math.round(mg),
      mmol: Math.round(toMmol(mg)*10)/10,
      kind: curKind,
      date: todayStr(),
      time: nowTime(),
      note: $('note').value.trim(),
      edited: false,
      created_at: new Date().toISOString(),
    };
    const saved = await dbInsert(rec);
    records.unshift(saved || rec);
  }

  // Giữ màu nền trạng thái cho popup; reset sau khi popup tắt
  showPopup(verdictCls);

  $('mg').value=''; $('note').value='';
  $('live').style.display='none';
  userPicked = false;
  render();
  applySuggestion();
  // áp lại màu nền theo kết quả vừa lưu (vì applySuggestion/updateLive đã gỡ)
  document.body.classList.remove('state-ok','state-warn','state-high');
  document.body.classList.add('state-'+verdictCls);
});

// ===== Sửa bản ghi cũ =====
function startEdit(id){
  const r = records.find(x=> String(x.id) === String(id));
  if(!r) return;
  editingId = r.id;
  curKind = r.kind; userPicked = true;
  [...$('seg').children].forEach(x=> x.classList.toggle('active', x.dataset.k===r.kind));
  $('hint').textContent = '';
  $('mg').value = r.mg;
  $('note').value = r.note || '';
  $('formTitle').textContent = 'Sửa kết quả đo';
  $('editbar').classList.add('on');
  $('save').textContent = 'Lưu thay đổi';
  updateLive();
  document.querySelector('.card').scrollIntoView({behavior:'smooth', block:'start'});
}
function exitEdit(){
  editingId = null;
  $('formTitle').textContent = 'Nhập kết quả đo';
  $('editbar').classList.remove('on');
  $('save').textContent = 'Lưu vào dữ liệu';
}
$('cancelEdit').addEventListener('click', ()=>{
  exitEdit();
  $('mg').value=''; $('note').value='';
  $('live').style.display='none'; $('save').disabled=true;
  userPicked = false;
  applySuggestion();
});

// ===== Render =====
function render(){
  // stats
  if(records.length){
    $('statsCard').style.display='block';
    const ok = records.filter(r=> assess(r.mmol, r.kind).cls==='ok').length;
    const high = records.length - ok;
    const avg = records.reduce((s,r)=>s+r.mmol,0)/records.length;
    $('stTotal').textContent = records.length;
    $('stOk').textContent = ok;
    $('stHigh').textContent = high;
    $('stAvg').textContent = fmt(avg);
  } else $('statsCard').style.display='none';

  // history
  const h = $('history');
  if(!records.length){ h.innerHTML = '<div class="empty">Chưa có dữ liệu nào hết ♥ Nhập kết quả đo đầu tiên ở trên nhé.</div>'; return; }
  let rows = records.map(r=>{
    const a = assess(r.mmol, r.kind);
    const d = r.date ? r.date.split('-').reverse().slice(0,2).join('/') : '';
    return `<tr>
      <td style="white-space:nowrap">${d} <span style="color:var(--muted)">- ${r.time||''}</span></td>
      <td>${TARGETS[r.kind].label}</td>
      <td style="white-space:nowrap"><span class="mval ${a.cls==='ok'?'':'hi'}">${fmt(r.mmol)}</span> <span style="color:var(--muted);font-size:11px">(${r.mg} mg/dL)</span></td>
      <td><span class="pill p-${a.cls}">${a.txt}</span></td>
      <td class="note-cell hide-sm">${r.note? escapeHtml(r.note):'<span style="opacity:.4">—</span>'}${r.edited?'<span style="color:var(--muted);font-size:10px"> (đã sửa)</span>':''}</td>
      <td style="text-align:right;white-space:nowrap">
        <button class="edit" data-id="${r.id}" title="Sửa">✎</button>
        <button class="del" data-id="${r.id}" title="Xoá">✕</button>
      </td>
    </tr>`;
  }).join('');
  h.innerHTML = `<table>
    <thead><tr><th>Ngày</th><th>Thời điểm</th><th>mmol/L</th><th>Đánh giá</th><th class="hide-sm">Ghi chú</th><th></th></tr></thead>
    <tbody>${rows}</tbody></table>`;
  h.querySelectorAll('.edit').forEach(b=> b.onclick = ()=> startEdit(b.dataset.id));
  h.querySelectorAll('.del').forEach(b=> b.onclick = async ()=>{
    const id = b.dataset.id;
    if(editingId !== null && id===editingId){ exitEdit(); $('mg').value=''; $('note').value=''; $('live').style.display='none'; $('save').disabled=true; }
    records = records.filter(r=> String(r.id) !== id);
    await dbDelete(id);
    render();
  });
}
function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

// ===== Xuất ảnh bảng theo dõi (PNG) =====
function mealOf(time){
  const h = parseInt((time||'12:00').slice(0,2),10);
  const m = parseInt((time||'12:00').slice(3,5),10);
  const t = h*60 + m;
  if(t < 10*60+30) return 'sang';
  if(t < 16*60)    return 'trua';
  return 'toi';
}

function buildTableCanvas(){
  if(!records.length){ return null; }

  function blank(){ return { doi:null, h1:null, h2:null, notes:[] }; }
  const byDate = {};
  for(const r of records){
    const d = r.date || '';
    const meal = mealOf(r.time);
    byDate[d] = byDate[d] || { sang:blank(), trua:blank(), toi:blank() };
    const cell = byDate[d][meal];
    cell[r.kind] = r;
    if(r.note) cell.notes.push(r.note);
  }
  const dates = Object.keys(byDate).sort();

  const sc = 2;
  const colDate=58, cDoi=54, cDiary=150, cH1=60, cH2=60, colNote=150;
  const mealW = cDoi + cDiary + cH1 + cH2;
  const W = colDate + mealW*3 + colNote;
  const titleH=42, headerH=64, footerH=42, lh=15;

  const mealKeys = ['sang','trua','toi'];
  const mealNames = ['SÁNG','TRƯA','TỐI'];

  // chiều cao mỗi hàng theo số dòng nhật ký + ghi chú
  function diaryLines(cell){ return cell.notes.length ? cell.notes : []; }
  const cv0 = document.createElement('canvas'); const mx0 = cv0.getContext('2d');
  function wrapCount(text, maxW, font){
    mx0.font = font; if(!text) return 0;
    const words = String(text).split(' '); let line='', n=1;
    for(const w of words){ const t=line?line+' '+w:w; if(mx0.measureText(t).width>maxW && line){ n++; line=w; } else line=t; }
    return n;
  }
  const heights = dates.map(d=>{
    const data = byDate[d];
    let maxL = 1;
    for(const k of mealKeys){
      const lines = data[k].notes.join(' • ');
      maxL = Math.max(maxL, wrapCount(lines, cDiary-12, '11px Arial'));
    }
    const noteLines = wrapCount(allNotes(data), colNote-12, '11px Arial');
    return Math.max(56, 14 + Math.max(maxL, noteLines)*lh);
  });
  function allNotes(data){ // ghi chú chung = gộp tất cả note trong ngày, ưu tiên những cái dài (xế...)
    const all = [...data.sang.notes, ...data.trua.notes, ...data.toi.notes];
    return ''; // để trống cột ghi chú chung (nhật ký đã chứa ghi chú từng bữa)
  }
  const bodyH = heights.reduce((a,b)=>a+b,0);
  const H = titleH + headerH + bodyH + footerH;

  const cv = document.createElement('canvas');
  cv.width = W*sc; cv.height = H*sc;
  const cx = cv.getContext('2d');
  cx.scale(sc,sc); cx.textBaseline='middle';
  const RED='#c0392b', BLK='#1a2730', MUT='#5f6f7a', LINE='#96a5b4', HEAD='#dbe1f2';

  cx.fillStyle='#fff'; cx.fillRect(0,0,W,H);
  cx.fillStyle=BLK; cx.font='700 19px Arial'; cx.textAlign='center';
  cx.fillText('BẢNG THEO DÕI ĐƯỜNG HUYẾT', W/2, titleH/2);

  const top = titleH;
  cx.fillStyle=HEAD; cx.fillRect(0, top, W, headerH);

  const mealX = i => colDate + mealW*i;
  // header hàng 1
  cx.fillStyle=BLK; cx.font='700 12px Arial'; cx.textAlign='center';
  cx.fillText('NGÀY', colDate/2, top+headerH/2);
  cx.font='700 14px Arial';
  for(let i=0;i<3;i++) cx.fillText(mealNames[i], mealX(i)+mealW/2, top+headerH/4);
  cx.font='700 12px Arial';
  cx.fillText('GHI CHÚ', colDate+mealW*3+colNote/2, top+headerH/2);

  // header hàng 2: cột con
  function sub(x){
    cx.font='700 10px Arial'; cx.fillStyle=BLK;
    cx.fillText('Lúc đói', x+cDoi/2, top+headerH*0.64);
    cx.fillText('Nhật ký', x+cDoi+cDiary/2, top+headerH*0.72);
    cx.fillText('Sau ăn 1h', x+cDoi+cDiary+cH1/2, top+headerH*0.64);
    cx.fillText('Sau ăn 2h', x+cDoi+cDiary+cH1+cH2/2, top+headerH*0.64);
    cx.font='8.5px Arial'; cx.fillStyle=MUT;
    cx.fillText('<5,3', x+cDoi/2, top+headerH*0.85);
    cx.fillText('<7,8', x+cDoi+cDiary+cH1/2, top+headerH*0.85);
    cx.fillText('<6,7', x+cDoi+cDiary+cH1+cH2/2, top+headerH*0.85);
  }
  for(let i=0;i<3;i++) sub(mealX(i));

  function wrap(text, x, y, maxW, color, font){
    if(!text) return;
    cx.font=font; cx.fillStyle=color; cx.textAlign='left';
    const words=String(text).split(' '); let line='', yy=y;
    for(const w of words){ const t=line?line+' '+w:w; if(cx.measureText(t).width>maxW && line){ cx.fillText(line,x,yy); line=w; yy+=lh; } else line=t; }
    if(line) cx.fillText(line,x,yy);
  }
  function val(rec, kind, cx0, cw, y, rh){
    if(!rec) return;
    const a = assess(rec.mmol, kind);
    cx.fillStyle = a.cls==='ok' ? BLK : RED;
    cx.font='700 14px Arial'; cx.textAlign='center';
    cx.fillText(fmt(rec.mmol), cx0+cw/2, y+rh/2);
  }

  // body
  let y = top + headerH;
  dates.forEach((d,i)=>{
    const rh = heights[i];
    const data = byDate[d];
    const dd = d ? d.split('-').reverse().slice(0,2).join('/') : '';
    cx.fillStyle=BLK; cx.font='700 12px Arial'; cx.textAlign='center';
    cx.fillText(dd, colDate/2, y+rh/2);

    for(let mi=0; mi<3; mi++){
      const x = mealX(mi);
      const cell = data[mealKeys[mi]];
      val(cell.doi, 'doi', x, cDoi, y, rh);
      // nhật ký = ghi chú bữa
      wrap(cell.notes.join(' • '), x+cDoi+5, y+12, cDiary-10, BLK, '11px Arial');
      val(cell.h1, 'h1', x+cDoi+cDiary, cH1, y, rh);
      val(cell.h2, 'h2', x+cDoi+cDiary+cH1, cH2, y, rh);
    }
    // ghi chú chung để trống
    y += rh;
  });

  // lưới
  cx.strokeStyle=LINE; cx.lineWidth=1;
  const bottom = top + headerH + bodyH;
  const midH = top + headerH/2;
  cx.strokeRect(0.5, top+0.5, W-1, headerH+bodyH);
  cx.beginPath();
  // vạch dọc "bao": NGÀY | mỗi bữa | GHI CHÚ -> kẻ suốt (merge tên bữa)
  const boundary=[colDate];
  for(let mi=0; mi<3; mi++) boundary.push(colDate+mealW*(mi+1));
  for(const x of boundary){ cx.moveTo(x+0.5, top); cx.lineTo(x+0.5, bottom); }
  // vạch dọc cột con bên trong mỗi bữa -> chỉ từ giữa header xuống
  for(let mi=0; mi<3; mi++){
    const b=mealX(mi);
    for(const x of [b+cDoi, b+cDoi+cDiary, b+cDoi+cDiary+cH1]){ cx.moveTo(x+0.5, midH); cx.lineTo(x+0.5, bottom); }
  }
  // ngang: dưới header + giữa các hàng
  cx.moveTo(0, top+headerH+0.5); cx.lineTo(W, top+headerH+0.5);
  let yy=top+headerH;
  for(const rh of heights){ yy+=rh; cx.moveTo(0,yy+0.5); cx.lineTo(W,yy+0.5); }
  // vạch ngăn 2 hàng header: chỉ trong vùng các bữa
  cx.moveTo(colDate, midH+0.5); cx.lineTo(colDate+mealW*3, midH+0.5);
  cx.stroke();

  // chân
  cx.textAlign='left';
  cx.fillStyle=MUT; cx.font='10px Arial';
  cx.fillText('Mục tiêu (mmol/L): Lúc đói <5,3 — Sau ăn 1h <7,8 — Sau ăn 2h <6,7.', 8, bottom+14);
  cx.fillStyle=RED;
  cx.fillText('Số màu đỏ: vượt mục tiêu.', 8, bottom+29);

  return cv;
}

function downloadTable(){
  const cv = buildTableCanvas();
  if(!cv){ alert('Chưa có dữ liệu để xuất.'); return; }
  cv.toBlob(blob=>{
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download='bang-duong-huyet-'+todayStr().replace(/-/g,'')+'.png'; a.click();
    URL.revokeObjectURL(url);
  }, 'image/png');
}

// ===== Modal xem ảnh: zoom + pan =====
let tmScale=1, tmX=0, tmY=0;
function tmApply(){
  const img=$('tableImg');
  img.style.transform=`translate(${tmX}px,${tmY}px) scale(${tmScale})`;
}
function tmReset(){ tmScale=1; tmX=0; tmY=0; tmApply(); }
function tmZoom(delta, cx, cy){
  const prev=tmScale;
  tmScale=Math.min(6, Math.max(1, tmScale+delta));
  if(tmScale===1){ tmX=0; tmY=0; }
  tmApply();
}

function viewTable(){
  const cv = buildTableCanvas();
  if(!cv){ alert('Chưa có dữ liệu để xem.'); return; }
  $('tableImg').src = cv.toDataURL('image/png');
  tmReset();
  $('tableModal').classList.add('show');
}
function closeTable(){ $('tableModal').classList.remove('show'); }

$('viewBtn').addEventListener('click', viewTable);
$('tableClose').addEventListener('click', closeTable);
$('tableDownload').addEventListener('click', downloadTable);
$('zoomIn').addEventListener('click', ()=> tmZoom(0.4));
$('zoomOut').addEventListener('click', ()=> tmZoom(-0.4));

// cuộn chuột để zoom
$('tmStage').addEventListener('wheel', e=>{ e.preventDefault(); tmZoom(e.deltaY<0?0.3:-0.3); }, {passive:false});

// kéo để di chuyển khi đã phóng to
(function(){
  const img=$('tableImg'); let drag=false, sx=0, sy=0;
  function start(x,y){ if(tmScale<=1) return; drag=true; sx=x-tmX; sy=y-tmY; img.classList.add('grabbing'); }
  function move(x,y){ if(!drag) return; tmX=x-sx; tmY=y-sy; tmApply(); }
  function end(){ drag=false; img.classList.remove('grabbing'); }
  img.addEventListener('mousedown', e=>{ e.preventDefault(); start(e.clientX,e.clientY); });
  window.addEventListener('mousemove', e=> move(e.clientX,e.clientY));
  window.addEventListener('mouseup', end);
  // chạm
  let lastDist=0;
  img.addEventListener('touchstart', e=>{
    if(e.touches.length===1) start(e.touches[0].clientX, e.touches[0].clientY);
    else if(e.touches.length===2) lastDist=touchDist(e);
  }, {passive:true});
  $('tmStage').addEventListener('touchmove', e=>{
    if(e.touches.length===2){ e.preventDefault();
      const d=touchDist(e); tmZoom((d-lastDist)*0.005); lastDist=d;
    } else if(e.touches.length===1){ move(e.touches[0].clientX, e.touches[0].clientY); }
  }, {passive:false});
  img.addEventListener('touchend', end);
  function touchDist(e){ const a=e.touches[0],b=e.touches[1]; return Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY); }
  // double click/tap để toggle zoom
  img.addEventListener('dblclick', ()=>{ if(tmScale>1) tmReset(); else tmZoom(1.5); });
})();

// nền (ngoài ảnh) hoặc Esc để đóng
$('tableModal').addEventListener('click', e=>{ if(e.target.id==='tableModal' || e.target.id==='tmStage') closeTable(); });
window.addEventListener('keydown', e=>{ if(e.key==='Escape') closeTable(); });

// ===== Boot =====
(async ()=>{ records = await load(); render(); applySuggestion(); })();
</script>
